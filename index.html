// Lấy từ localStorage (giáo viên nhập lần đầu qua màn Setup)
const getDbUrl = () => {
  const u = localStorage.getItem('aedu_firebase_url') || '';
  return u.replace(/\/+$/, ''); // bỏ dấu / cuối nếu có
};
const setDbUrl = (u) => localStorage.setItem('aedu_firebase_url', u.replace(/\/+$/, ''));

const DB = {
  // Ghi dữ liệu
  put: async (path, data) => {
    const url = getDbUrl();
    if (!url) throw new Error('Chưa cấu hình Firebase.');
    const res = await fetch(`${url}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`Firebase lỗi ${res.status}`);
    return res.json();
  },
  // Đọc dữ liệu
  get: async (path) => {
    const url = getDbUrl();
    if (!url) return null;
    const res = await fetch(`${url}/${path}.json`);
    if (!res.ok) return null;
    return res.json();
  },
  // Thêm dữ liệu (tạo key tự động)
  post: async (path, data) => {
    const url = getDbUrl();
    if (!url) throw new Error('Chưa cấu hình Firebase.');
    const res = await fetch(`${url}/${path}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`Firebase lỗi ${res.status}`);
    return res.json();
  },
  // Test kết nối
  test: async (url) => {
    const clean = url.replace(/\/+$/, '');
    const res = await fetch(`${clean}/ping.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ok: true, ts: Date.now() })
    });
    return res.ok;
  }
};

const LIB_KEY = 'aedu_doclib_v2';
const DocLib = {
  getAll: () => {
    try { return JSON.parse(localStorage.getItem(LIB_KEY)||'[]'); } catch { return []; }
  },
  save: (name, content, type='txt') => {
    const all = DocLib.getAll();
    const id  = Date.now().toString(36);
    const doc = { id, name: name.trim().slice(0,60), content: content.slice(0,12000), type, savedAt: new Date().toISOString(), size: content.length };
    // Tối đa 30 tài liệu, nếu vượt thì xóa cũ nhất
    const updated = [doc, ...all].slice(0, 30);
    localStorage.setItem(LIB_KEY, JSON.stringify(updated));
    return updated;
  },
  delete: (id) => {
    const updated = DocLib.getAll().filter(d => d.id !== id);
    localStorage.setItem(LIB_KEY, JSON.stringify(updated));
    return updated;
  },
};

// Đọc file thành base64 (dùng cho PDF)
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result.split(',')[1]); // bỏ "data:...;base64," ở đầu
    r.onerror = () => rej(new Error('Không đọc được file.'));
    r.readAsDataURL(file);
  });
}

// Đọc file DOCX/TXT thành văn bản thuần
async function extractTextFile(file) {
  const name = file.name.toLowerCase();
  // TXT
  if (file.type === 'text/plain' || name.endsWith('.txt')) {
    return await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = () => rej(new Error('Không đọc được file TXT.'));
      r.readAsText(file, 'utf-8');
    });
  }
  // DOCX
  if (name.endsWith('.docx') || name.endsWith('.doc') || file.type.includes('wordprocessingml') || file.type.includes('msword')) {
    if (typeof mammoth === 'undefined') throw new Error('Thư viện đọc Word chưa tải. Kiểm tra mạng rồi thử lại.');
    const buf    = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buf });
    if (!result.value?.trim()) throw new Error('File Word không có nội dung. Thử mở và lưu lại bằng Word 2007 trở lên (.docx).');
    return result.value.trim();
  }
  const ext = name.split('.').pop().toUpperCase();
  throw new Error(`Định dạng .${ext} chưa được hỗ trợ. Dùng PDF, Word (.docx), hoặc TXT.`);
}

};

// AI GENERATION — Google Gemini API (MIỄN PHÍ)
// Gemini 2.0 Flash: 1500 request/ngày free, đọc PDF scan như AI Studio
// ═══════════════════════════════════════════════════════
const GEMINI_MODEL = "gemini-2.0-flash";
const GEMINI_URL   = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

async function generateBank(topic, material, pdfFiles = []) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('Chưa có API Key. Vào Cài đặt → nhập Google Gemini API Key.');

  const instruction = `Bạn là chuyên gia sư phạm Việt Nam chuyên thiết kế đề kiểm tra theo thang Bloom.

Chủ đề: "${topic}"
${material.trim() ? `Tài liệu bổ sung:\n"""\n${material}\n"""` : ''}
${pdfFiles.length > 0
  ? `(Đã đính kèm ${pdfFiles.length} file tài liệu ở trên — hãy đọc kỹ nội dung trước khi ra đề.)`
  : 'Sử dụng kiến thức chuẩn chương trình phổ thông Việt Nam.'}

NHIỆM VỤ: Dựa vào tài liệu được cung cấp, tạo ngân hàng câu hỏi phân hóa 3 mức A/B/C về chủ đề "${topic}".

LUẬT NGHIÊM NGẶT:
1. Chỉ trả về JSON thuần túy. TUYỆT ĐỐI không markdown, không giải thích trước/sau.
2. JSON phải hợp lệ 100%.
3. Tạo đúng 15 câu: 5 mức A + 5 mức B + 5 mức C.
4. Mỗi mức: ít nhất 2 trắc nghiệm, 1 đúng/sai, 1 câu ngắn.
5. Tất cả nội dung bằng tiếng Việt, bám sát nội dung tài liệu đính kèm.

JSON CẤU TRÚC BẮT BUỘC:
{
  "matrix": [
    {"level":"A","title":"Biết","description":"Mô tả.","requirements":"Yêu cầu cần đạt."},
    {"level":"B","title":"Hiểu","description":"Mô tả.","requirements":"Yêu cầu cần đạt."},
    {"level":"C","title":"Vận dụng","description":"Mô tả.","requirements":"Yêu cầu cần đạt."}
  ],
  "questions": [
    {"id":"1","code":"MA-A01","type":"multiple_choice","level":"A",
     "content":"Câu hỏi?","options":["A. ...","B. ...","C. ...","D. ..."],
     "answer":"B","explanation":"Giải thích.","commonErrors":"Lỗi thường gặp."},
    {"id":"2","code":"MA-A02","type":"true_false","level":"A",
     "content":"Ngữ cảnh:","options":[],
     "subQuestions":[{"id":"a","content":"Nhận định a.","answer":"true"},{"id":"b","content":"Nhận định b.","answer":"false"},{"id":"c","content":"Nhận định c.","answer":"true"},{"id":"d","content":"Nhận định d.","answer":"false"}],
     "answer":"","explanation":"Giải thích.","commonErrors":"Lỗi thường gặp."},
    {"id":"3","code":"MA-C01","type":"short_answer","level":"C",
     "content":"Câu hỏi?","options":[],"subQuestions":[],
     "answer":"Đáp án mẫu.","explanation":"Giải thích.","commonErrors":"Lỗi thường gặp."}
  ]
}`;

  // Gemini format: parts array — PDF dùng inline_data, text dùng text
  const parts = [
    // PDF files đính kèm trực tiếp (Gemini đọc như AI Studio)
    ...pdfFiles.map(f => ({
      inline_data: { mime_type: "application/pdf", data: f.base64 }
    })),
    // Câu lệnh văn bản
    { text: instruction }
  ];

  const res = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { temperature: 0.4, maxOutputTokens: 4096 }
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    const msg = e?.error?.message || `Lỗi API ${res.status}`;
    if (res.status === 400) throw new Error('API Key sai hoặc không hợp lệ. Kiểm tra lại key.');
    if (res.status === 429) throw new Error('Quá giới hạn miễn phí hôm nay (1500 request/ngày). Thử lại vào ngày mai.');
    throw new Error(msg);
  }

  const data  = await res.json();
  const raw   = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  const clean = raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(clean); }
  catch {
    const m = clean.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error("AI trả dữ liệu không hợp lệ. Thêm tài liệu chi tiết hơn và thử lại.");
  }
}

function ApiKeyScreen({ onDone }) {
  const [key,     setKey]     = useState("");

    setTesting(true); setMsg("Đang kiểm tra...");
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${k}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents:[{ parts:[{ text:"Hi" }] }], generationConfig:{ maxOutputTokens:5 } })
        }
      );
      if (res.ok) {
        setMsg("✅ API Key hợp lệ! Kết nối Gemini thành công."); setOk(true);
      } else if (res.status === 429) {
        // 429 = rate limit = key đúng, chỉ bị giới hạn tốc độ tạm thời
        setMsg("✅ API Key hợp lệ! (Lỗi 429 chỉ là giới hạn tốc độ, không ảnh hưởng khi dùng thật)"); setOk(true);
      } else if (res.status === 400) {
        setMsg("❌ API Key sai. Kiểm tra lại trên aistudio.google.com");
      } else if (res.status === 403) {
        setMsg("❌ Key chưa được kích hoạt. Thử tạo key mới.");
      } else {
        setMsg(`❌ Lỗi ${res.status}. Thử lại sau.`);

          <div>

            <div style={{fontSize:12,color:"#166534",lineHeight:1.6}}>
              ✓ 1.500 lượt tạo đề mỗi ngày (đủ cho cả trường)<br/>

  if (!hasKey) return <ApiKeyScreen onDone={()=>setHasKey(true)} />;
  // Bước 2: cần Firebase URL
  if (!hasDb)  return <SetupScreen  onDone={()=>setHasDb(true)} />;

  if (screen==="teacher") return <TeacherApp onHome={()=>setScreen("home")} />;
  if (screen==="student") return <StudentApp initCode={initCode} onHome={()=>setScreen("home")} />;
  return <HomePage
    onTeacher={()=>setScreen("teacher")}
    onStudent={c=>{setInitCode(c);setScreen("student");}}
    onSetup={()=>{clearDbUrl();setHasDb(false);}}
    onChangeKey={()=>{clearApiKey();setHasKey(false);}}
  />;
}

function TeacherApp({ onHome }) {
  const [section,   setSection]   = useState("create");
  const [step,      setStep]      = useState("input");
  const [topic,     setTopic]     = useState("");
  const [material,  setMaterial]  = useState("");
  const [matrix,    setMatrix]    = useState([]);
  const [questions, setQuestions] = useState([]);
  const [tab,       setTab]       = useState("matrix");
  const [loadMsg,   setLoadMsg]   = useState("");
  const [err,       setErr]       = useState("");
  const [codes,     setCodes]     = useState({});
  const [justCopied,setJustCopied]= useState("");
  const [fileLoading,setFileLoading]=useState(false);
  const [fileErr,   setFileErr]   = useState("");
  const [pdfFiles,  setPdfFiles]  = useState([]); // [{name, base64, size}] — PDF gửi thẳng vào Claude
  const [library,   setLibrary]   = useState(DocLib.getAll());
  const [docName,   setDocName]   = useState("");
  const fileRef = useRef(null);

  const MSGS = ["Đang phân tích tài liệu tham khảo...","Đang xây dựng ma trận phân hóa A-B-C...","Đang soạn câu hỏi theo thang Bloom...","Đang kiểm tra tính sư phạm...","Sắp hoàn tất, vui lòng chờ thêm..."];

  const handleGenerate = async () => {
    if (!topic.trim()) return;
    setErr(""); setStep("loading");
    let i=0; setLoadMsg(MSGS[0]);
    const iv = setInterval(()=>{ i=(i+1)%MSGS.length; setLoadMsg(MSGS[i]); }, 2400);
    try {
      const data = await generateBank(topic.trim(), material.trim(), pdfFiles);
      if (!data.questions?.length) throw new Error("AI không tạo được câu hỏi. Hãy thêm tài liệu chi tiết hơn.");
      setMatrix(data.matrix||[]); setQuestions(data.questions);
      setStep("result"); setTab("matrix"); setCodes({});
    } catch(e) { setErr(e.message); setStep("input"); }
    finally { clearInterval(iv); }
  };

  const handleFile = async e => {
    const files = Array.from(e.target.files || []);
    if (fileRef.current) fileRef.current.value = "";
    if (!files.length) return;
    setFileLoading(true); setFileErr("");
    try {
      for (const f of files) {
        const name = f.name.toLowerCase();
        const isPdf = f.type === 'application/pdf' || name.endsWith('.pdf');
        if (isPdf) {
          // ⭐ PDF: đọc thành base64, gửi thẳng vào Claude — không cần OCR
          const MB = f.size / 1024 / 1024;
          if (MB > 30) throw new Error(`File "${f.name}" quá lớn (${MB.toFixed(1)}MB). Giới hạn 30MB mỗi file PDF.`);
          const base64 = await fileToBase64(f);
          setPdfFiles(prev => {
            // Tránh trùng tên
            const filtered = prev.filter(p => p.name !== f.name);
            return [...filtered, { name: f.name, base64, size: f.size, sizeMB: MB.toFixed(1) }];
          });
          setDocName(f.name.replace(/\.[^.]+$/, ''));
        } else {
          // DOCX / TXT: trích xuất văn bản
          const text = await extractTextFile(f);
          setMaterial(prev => prev ? prev + '\n\n---\n\n' + text.slice(0, 8000) : text.slice(0, 8000));
          setDocName(f.name.replace(/\.[^.]+$/, ''));
        }
      }
    } catch(err) {
      setFileErr(err.message);
    } finally {
      setFileLoading(false);
    }
  };

  const handleRemovePdf = (name) => {
    setPdfFiles(prev => prev.filter(p => p.name !== name));
  };

  const handleSaveToLib = () => {
    if (!material.trim()) return;
    const name = docName.trim() || topic.trim() || `Tài liệu ${new Date().toLocaleDateString('vi-VN')}`;
    const updated = DocLib.save(name, material);
    setLibrary(updated);
    setDocName(name);
  };

  const handleSelectFromLib = (doc) => {
    setMaterial(doc.content);
    setDocName(doc.name);
    setFileErr("");
  };

  const handleDeleteFromLib = (id) => {
    const updated = DocLib.delete(id);
    setLibrary(updated);
  };

  const handleShare = async lv => {
    const qs = lv==="all" ? questions : questions.filter(q=>q.level===lv);
    if (!qs.length) { alert("Không có câu hỏi ở mức này."); return; }
    const code = genCode();
    try {
      await saveQuiz(code, {title:topic+(lv==="all"?" — Tổng hợp":` — Mức ${lv}`), level:lv, questions:qs, createdAt:new Date().toISOString()});
      setCodes(p=>({...p,[lv]:code}));
      setJustCopied(lv);
      try { await navigator.clipboard.writeText(code); } catch {}
      setTimeout(()=>setJustCopied(""), 4000);
    } catch(e) { alert("Lỗi lưu bài tập: " + e.message); }
  };

  const downloadCSV = () => {
    const hdr = ["Mã đề","Mức","Loại","Câu hỏi","Đáp án","Giải thích","Lỗi thường gặp"];
    const rows = questions.map(q=>{
      const ans = q.type==="true_false" ? (q.subQuestions?.map((s,i)=>`${String.fromCharCode(97+i)}:${s.answer==="true"?"Đ":"S"}`).join("; ")||"") : q.answer;
      return [q.code||"",q.level,TYPE_LABEL[q.type]||q.type,(q.content||"").replace(/\n/g," "),ans,q.explanation||"",q.commonErrors||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",");
    });
    const blob = new Blob(["\uFEFF"+[hdr.join(","),...rows].join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`NganHang_${topic.replace(/[^\w]/g,"_").slice(0,40)}.csv`; a.click();
  };

  return (
    <div style={{minHeight:"100vh",background:"#FAFAFA"}}>
      <header style={{position:"sticky",top:0,zIndex:50,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.s100}`,padding:"12px 22px"}}>
        <div style={{maxWidth:920,margin:"0 auto",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <Logo onClick={onHome}/>
          <div style={{flex:1}}/>
          <TabBar tabs={[["create","Tạo bài tập",Ic.Book],["results","Kết quả HS",Ic.Users]]} value={section} onChange={setSection}/>
          {step==="result"&&<button onClick={()=>{setStep("input");setSection("create");}} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:700,color:C.s400,background:"none",border:"none",cursor:"pointer",padding:"6px 9px",borderRadius:8}}>{I(Ic.Redo,13)} Tạo mới</button>}
          <button onClick={onHome} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:700,color:C.s400,background:"none",border:"none",cursor:"pointer",padding:"6px 9px",borderRadius:8}}>{I(Ic.Home,13)} Trang chủ</button>
        </div>
      </header>
      <main style={{maxWidth:920,margin:"0 auto",padding:"36px 18px 70px"}}>
        {section==="create"&&step==="input"   && <InputStep {...{topic,setTopic,material,setMaterial,onGenerate:handleGenerate,fileRef,onFile:handleFile,err,fileLoading,fileErr,setFileErr,pdfFiles,onRemovePdf:handleRemovePdf,library,docName,setDocName,onSaveToLib:handleSaveToLib,onSelectFromLib:handleSelectFromLib,onDeleteFromLib:handleDeleteFromLib}}/>}
        {section==="create"&&step==="loading" && <LoadingStep msg={loadMsg}/>}
        {section==="create"&&step==="result"  && <ResultStep {...{matrix,questions,tab,setTab,onShare:handleShare,codes,justCopied,onDownload:downloadCSV,topic}}/>}
        {section==="results" && <ResultsSection/>}
      </main>
    </div>
  );
}

function InputStep({ topic,setTopic,material,setMaterial,onGenerate,fileRef,onFile,err,fileLoading,fileErr,setFileErr,pdfFiles,onRemovePdf,library,docName,setDocName,onSaveToLib,onSelectFromLib,onDeleteFromLib }) {

        <div style={{marginBottom:24}}>

            <div style={{display:"flex",gap:7,alignItems:"center"}}>

              </button>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.b700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                    <div style={{fontSize:10,color:C.b600,marginTop:1}}>PDF · {f.sizeMB}MB · ⭐ Gửi thẳng vào Claude — đọc chính xác như AI Studio</div>

              </div>

                ? <div style={{padding:"24px 16px",textAlign:"center",color:C.s400,fontSize:13}}>Chưa có tài liệu nào được lưu.<br/><span style={{fontSize:12}}>Tải file lên và nhấn "Lưu vào kho" để bắt đầu.</span></div>
                : <div style={{maxHeight:260,overflowY:"auto"}}>
                    {library.map(doc=>(
                      <div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderBottom:`1px solid ${C.s100}`,background:"white"}}>
                        <div style={{fontSize:18,flexShrink:0}}>{doc.type==='pdf'?'📄':doc.type==='docx'?'📝':'📃'}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:C.s900,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</div>

              </div>
            </div>
          )}

          {/* Định dạng hỗ trợ */}
          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,color:C.s500}}>Hỗ trợ:</span>
            {[["📄","PDF (scan & text)","blue"],["📝","Word (.docx)","gray"],["📃","TXT","gray"],["✏️","Dán tay","gray"]].map(([icon,label,t])=>(
              <span key={label} style={{fontSize:10,fontWeight:600,color:t==="blue"?C.b700:C.s500,background:t==="blue"?C.b50:C.s100,padding:"3px 9px",borderRadius:99,border:t==="blue"?`1px solid ${C.b100}`:"none"}}>{icon} {label}</span>
            ))}
            <span style={{fontSize:10,color:C.s400,marginLeft:4}}>· Chọn nhiều file cùng lúc</span>
          </div>
        </div>

        <Btn onClick={onGenerate} disabled={!topic.trim()} sx={{width:"100%",padding:17,fontSize:16,borderRadius:16}}>
          Bắt đầu quy trình 4 bước &nbsp;{I(Ic.Arrow,20)}
        </Btn>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
        {[["⚡","Nhanh chóng","15+ câu hỏi phân hóa trong 1–3 phút"],["🎯","Phân hóa","Mức A/B/C theo thang Bloom chuẩn sư phạm"],["☁️","Đám mây","Dữ liệu lưu Firebase, HS nhiều máy cùng nộp bài"]].map(([e,t,d])=>(
          <div key={t} style={{background:"white",padding:"16px 18px",borderRadius:16,border:`1px solid ${C.s100}`}}>
            <div style={{fontSize:22,marginBottom:7}}>{e}</div>
            <div style={{fontSize:13,fontWeight:800,color:C.s900,marginBottom:4}}>{t}</div>
            <div style={{fontSize:12,color:C.s400,lineHeight:1.5}}>{d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LoadingStep({ msg }) {
  const steps=["Phân tích tài liệu","Xây dựng ma trận","Soạn câu hỏi","Kiểm tra sư phạm"];
  const [active,setActive]=useState(0);
  useEffect(()=>{ const t=setInterval(()=>setActive(a=>(a+1)%steps.length),2400); return()=>clearInterval(t); },[]);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:440,gap:30}}>
      <Ic.Spin width={52} height={52} style={{color:C.g600}}/>
      <div style={{textAlign:"center"}}>
        <p style={{fontSize:17,fontWeight:800,color:C.g600,marginBottom:7}}>{msg}</p>
        <p style={{fontSize:13,color:C.s400}}>AI đang làm việc, vui lòng không đóng trang này</p>
      </div>
      <div style={{display:"flex",gap:9,flexWrap:"wrap",justifyContent:"center"}}>
        {steps.map((s,i)=>(
          <div key={i} style={{padding:"7px 16px",borderRadius:99,fontSize:12,fontWeight:600,transition:"all 0.35s",
            background:i<active?C.g600:i===active?C.g50:C.s100,
            color:i<active?"white":i===active?C.g600:C.s400,border:`1px solid ${i<=active?C.g200:C.s200}`}}>
            {i<active?"✓ ":i===active?"⟳ ":""}{s}
          </div>
        ))}
      </div>
    </div>
  );
}

  const cnt={A:questions.filter(q=>q.level==="A").length,B:questions.filter(q=>q.level==="B").length,C:questions.filter(q=>q.level==="C").length};
  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:22}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,flexWrap:"wrap"}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:900,color:C.s900,marginBottom:6}}>{topic}</h2>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {[["A",cnt.A,C.b600],["B",cnt.B,C.g600],["C",cnt.C,C.a600]].map(([lv,n,c])=>(
              <span key={lv} style={{fontSize:11,fontWeight:700,color:"white",background:c,padding:"2px 9px",borderRadius:99}}>{n} câu mức {lv}</span>
            ))}
            <span style={{fontSize:11,fontWeight:700,color:C.s500,background:C.s100,padding:"2px 9px",borderRadius:99}}>Tổng: {questions.length} câu</span>
          </div>
        </div>
        <TabBar tabs={[["matrix","Ma trận",Ic.Layers],["bank","Ngân hàng",Ic.File],["download","Xuất CSV",Ic.Table]]} value={tab} onChange={setTab}/>
      </div>
      <div style={{background:"white",borderRadius:24,boxShadow:"0 6px 28px rgba(0,0,0,.06)",border:`1px solid ${C.s100}`,overflow:"hidden"}}>
        {tab==="matrix"   && <MatrixTab matrix={matrix}/>}

        {tab==="download" && <DownloadTab questions={questions} onDownload={onDownload}/>}
      </div>
      <ShareSection onShare={onShare} codes={codes} justCopied={justCopied}/>
    </div>
  );
}

  return (
    <div style={{padding:"26px 22px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:18}}>
      {matrix.map(item=>{
        const s=ST[item.level]||ST.B;
        return (
          <div key={item.level} style={{padding:22,borderRadius:18,border:`2px solid ${s.bdr}`,background:s.bg}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12}}>

function ResultsSection() {
  const [code,setCode]=useState(""), [results,setResults]=useState(null), [loading,setLoading]=useState(false), [searched,setSearched]=useState(false);
  const load = async () => {
    if (!code.trim()) return;
    setLoading(true); setSearched(false);
    try { const data=await loadResults(code.trim()); setResults(data); } catch(e) { setResults([]); }
    setLoading(false); setSearched(true);
  };
  const exportCSV = () => {
    if (!results?.length) return;
    const hdr=["STT","Họ tên","Mã HS","Lớp","Mức","Điểm","Tổng","Tỷ lệ%","Xếp loại","Thời gian nộp"];
    const rows=results.map((r,i)=>[i+1,r.studentName,r.studentId||"",r.className||"",r.quizLevel,r.score,r.total,Math.round(r.percentage),r.grade,r.submittedAt].map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(","));
    const blob=new Blob(["\uFEFF"+[hdr.join(","),...rows].join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`KetQua_${code}.csv`; a.click();
  };
  const avg=results?.length?Math.round(results.reduce((s,r)=>s+r.percentage,0)/results.length):0;
  const gcnt=results?.reduce((acc,r)=>({...acc,[r.grade]:(acc[r.grade]||0)+1}),{})||{};
  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:22,maxWidth:920}}>
      <h2 style={{fontSize:24,fontWeight:900,color:C.s900}}>Kết quả học sinh 📊</h2>
      <div style={{background:"white",padding:22,borderRadius:20,border:`1px solid ${C.s100}`,boxShadow:"0 2px 10px rgba(0,0,0,.04)"}}>

        <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
          <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&code&&load()}

            style={{flex:1,minWidth:180,padding:"12px 15px",background:C.s50,border:`1.5px solid ${C.s200}`,borderRadius:12,fontSize:14,fontFamily:"monospace",fontWeight:700,outline:"none",color:C.s900}}/>
          <Btn onClick={load} disabled={loading||!code.trim()} sx={{borderRadius:12}}>
            {loading?<Ic.Spin width={16} height={16} style={{color:C.w}}/>:I(Ic.Eye)} Xem kết quả
          </Btn>
          {results?.length>0&&<Btn onClick={exportCSV} variant="outline" sx={{borderRadius:12}}>{I(Ic.Down)} Xuất CSV</Btn>}
        </div>
      </div>
      {results?.length>0&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:11}}>
            {[{l:"Số học sinh",v:results.length,c:C.b600,bg:C.b50},{l:"Điểm trung bình",v:`${avg}%`,c:C.g600,bg:C.g50},
              ...["Giỏi","Khá","Trung bình","Yếu"].map(g=>({l:g,v:gcnt[g]||0,c:gradeColor(g),bg:gradeBg(g),u:"HS"}))
            ].map((s,i)=><div key={i} style={{background:"white",padding:"15px 17px",borderRadius:15,border:`1px solid ${C.s100}`}}><div style={{fontSize:12,color:C.s400,marginBottom:4}}>{s.l}</div><div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}<span style={{fontSize:11,color:C.s400,fontWeight:500,marginLeft:2}}>{s.u||""}</span></div></div>)}
          </div>
          <div style={{background:"white",borderRadius:20,border:`1px solid ${C.s100}`,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>

                <tbody>

                      <td style={{padding:"11px 14px"}}><span style={{fontSize:10,fontWeight:700,color:"white",background:{A:C.b600,B:C.g600,C:C.a600,all:C.p600}[r.quizLevel]||C.s400,padding:"2px 8px",borderRadius:99}}>{r.quizLevel==="all"?"Tổng hợp":`Mức ${r.quizLevel}`}</span></td>
                      <td style={{padding:"11px 14px",fontWeight:800,color:C.g600,fontSize:14}}>{r.score}/{r.total}</td>

                          <span style={{fontSize:12,fontWeight:700,color:C.s600}}>{Math.round(r.percentage)}%</span>
                        </div>
                      </td>
                      <td style={{padding:"11px 14px"}}><span style={{padding:"3px 10px",background:gradeBg(r.grade),color:gradeColor(r.grade),borderRadius:7,fontSize:11,fontWeight:900}}>{r.grade}</span></td>
                      <td style={{padding:"11px 14px",color:C.s400,fontSize:11,whiteSpace:"nowrap"}}>{new Date(r.submittedAt).toLocaleString("vi-VN")}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
      {searched&&!results?.length&&<div style={{textAlign:"center",padding:"54px 20px",background:"white",borderRadius:20,border:`2px dashed ${C.s200}`}}><div style={{fontSize:36,marginBottom:12}}>🔍</div><p style={{fontWeight:700,color:C.s700,marginBottom:5}}>Chưa có kết quả cho mã <span style={{fontFamily:"monospace",color:C.g600}}>{code}</span></p><p style={{color:C.s400,fontSize:13}}>Học sinh chưa nộp bài, hoặc mã không đúng.</p></div>}
    </div>
  );
}

function StudentApp({ initCode, onHome }) {
  const [step,     setStep]    = useState(initCode?"loading":"enter");
  const [code,     setCode]    = useState(initCode||"");
  const [quiz,     setQuiz]    = useState(null);
  const [err,      setErr]     = useState("");
  const [info,     setInfo]    = useState({name:"",studentId:"",className:""});
  const [idx,      setIdx]     = useState(0);
  const [log,      setLog]     = useState([]);
  const [sel,      setSel]     = useState(null);
  const [tfPick,   setTfPick]  = useState({});
  const [shortVal, setShortVal]= useState("");
  const [confirmed,setConfirmed]=useState(false);
  const [result,   setResult]  = useState(null);
  const [saving,   setSaving]  = useState(false);

  useEffect(()=>{ if(initCode) doLoad(initCode); },[]);

  const doLoad = async c => {
    setStep("loading"); setErr("");
    try { const data=await loadQuiz(c.trim()); if(!data){setErr(`Không tìm thấy bài tập mã "${c.toUpperCase()}". Kiểm tra lại mã.`);setStep("enter");}else{setQuiz(data);setStep("info");} }
    catch(e) { setErr("Lỗi kết nối: "+e.message); setStep("enter"); }
  };

  const q=quiz?.questions?.[idx], totalQ=quiz?.questions?.length||0;

  const confirm = () => {
    if(!q||confirmed) return;
    let ans="", ok=false;
    if(q.type==="multiple_choice") { ans=sel||""; ok=!!sel&&sel.toUpperCase()===q.answer.trim()[0].toUpperCase(); }
    else if(q.type==="true_false") { ans=JSON.stringify(tfPick); ok=(q.subQuestions?.every(s=>tfPick[s.id]===s.answer)??false); }
    else { ans=shortVal.trim(); const al=q.answer.toLowerCase(),ul=ans.toLowerCase(); ok=ul.length>0&&(al.includes(ul)||ul.includes(al.substring(0,Math.min(al.length,14)))); }
    const rec={questionId:q.id,type:q.type,level:q.level,question:q.content,answer:ans,isCorrect:ok,explanation:q.explanation,commonErrors:q.commonErrors};
    setResult(rec); setLog(prev=>[...prev,rec]); setConfirmed(true);
  };

  const next = () => {
    const nextIdx=idx+1;
    setSel(null); setTfPick({}); setShortVal(""); setConfirmed(false); setResult(null);
    if(nextIdx<totalQ) { setIdx(nextIdx); }
    else {
      setLog(prev=>{
        const all=prev, sc=all.filter(a=>a.isCorrect).length, pct=(sc/totalQ)*100;
        setSaving(true);
        saveResult(code.toUpperCase(),{studentName:info.name,studentId:info.studentId,className:info.className,quizId:code.toUpperCase(),quizLevel:quiz.level,score:sc,total:totalQ,percentage:pct,grade:getGrade(pct),submittedAt:new Date().toISOString()})
          .catch(e=>console.error("Lỗi lưu kết quả:",e))
          .finally(()=>setSaving(false));
        return all;
      });
      setStep("finished");
    }
  };

  const sc=log.filter(a=>a.isCorrect).length, pct=totalQ>0?(sc/totalQ)*100:0, grd=getGrade(pct);

  return (
    <div style={{minHeight:"100vh",background:C.s50}}>
      <div style={{background:"white",borderBottom:`1px solid ${C.s100}`,padding:"12px 22px",display:"flex",alignItems:"center",gap:12}}>
        <Logo/><div style={{flex:1}}/>
        {quiz&&<div style={{padding:"4px 13px",background:C.g100,color:C.g800,borderRadius:99,fontSize:11,fontWeight:900}}>{quiz.level==="all"?"Tổng hợp":`Mức ${quiz.level}`}</div>}
        {step==="quiz"&&<div style={{fontSize:12,fontWeight:700,color:C.s400}}>{idx+1}/{totalQ}</div>}
        <button onClick={onHome} style={{fontSize:12,fontWeight:700,color:C.s400,background:"none",border:"none",cursor:"pointer",padding:"5px 8px"}}>Trang chủ</button>
      </div>

      <div style={{maxWidth:630,margin:"0 auto",padding:"28px 16px 60px"}}>

        {step==="enter"&&(
          <div className="fade-in" style={{background:"white",borderRadius:22,padding:30,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
            <div style={{fontSize:34,marginBottom:14}}>🎯</div>
            <h2 style={{fontSize:22,fontWeight:900,color:C.s900,marginBottom:8}}>Nhập mã bài tập</h2>
            <p style={{color:C.s400,fontSize:14,marginBottom:22}}>Nhập mã bài tập do giáo viên cung cấp.</p>
            {err&&<div style={{background:C.r50,color:C.r600,padding:"12px 15px",borderRadius:12,marginBottom:16,fontSize:13,border:`1px solid ${C.r100}`}}>{err}</div>}
            <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={8} onKeyDown={e=>e.key==="Enter"&&code.trim()&&doLoad(code)}
              placeholder="Ví dụ: ABC123"
              style={{width:"100%",padding:"16px",background:C.s50,border:`2px solid ${C.s200}`,borderRadius:14,fontSize:22,fontFamily:"monospace",fontWeight:900,letterSpacing:"0.22em",outline:"none",color:C.s900,textAlign:"center",marginBottom:12}}/>
            <Btn onClick={()=>code.trim()&&doLoad(code)} sx={{width:"100%",padding:16,fontSize:15,borderRadius:15}}>Vào bài {I(Ic.Arrow,18)}</Btn>
          </div>
        )}

        {step==="loading"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:18,padding:70}}><Ic.Spin width={44} height={44} style={{color:C.g600}}/><p style={{color:C.s600,fontWeight:600,fontSize:15}}>Đang tải bài tập...</p></div>}

        {step==="info"&&(
          <div className="fade-in" style={{background:"white",borderRadius:22,padding:30,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
            <div style={{background:C.g50,border:`1px solid ${C.g100}`,borderRadius:14,padding:"14px 18px",marginBottom:22}}>
              <div style={{fontSize:14,fontWeight:700,color:C.g800}}>{quiz?.title}</div>
              <div style={{fontSize:12,color:C.g600,marginTop:4}}>{quiz?.questions?.length} câu · {quiz?.level==="all"?"Tổng hợp A+B+C":`Phân hóa mức ${quiz?.level}`}</div>
            </div>
            <h2 style={{fontSize:20,fontWeight:900,color:C.s900,marginBottom:18}}>Thông tin của bạn</h2>
            {[{k:"name",l:"Họ và tên",ph:"Nguyễn Văn An",req:true},{k:"studentId",l:"Mã học sinh",ph:"HS001"},{k:"className",l:"Lớp",ph:"10A1"}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:10,fontWeight:900,textTransform:"uppercase",letterSpacing:"0.12em",color:C.s400,marginBottom:6}}>{f.l} {f.req&&<span style={{color:C.r600}}>*</span>}</label>
                <input value={info[f.k]} onChange={e=>setInfo(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}
                  style={{width:"100%",padding:"12px 14px",background:C.s50,border:`1.5px solid ${C.s200}`,borderRadius:11,fontSize:14,outline:"none",color:C.s900}}/>
              </div>
            ))}
            <Btn onClick={()=>info.name.trim()&&setStep("quiz")} disabled={!info.name.trim()} sx={{width:"100%",padding:16,fontSize:15,borderRadius:15,marginTop:6}}>
              {I(Ic.Play,19)} Bắt đầu làm bài
            </Btn>
          </div>
        )}

        {step==="quiz"&&q&&(
          <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.s400,marginBottom:6}}>
                <span>Câu {idx+1} / {totalQ}</span>
                <span>{log.filter(a=>a.isCorrect).length} đúng · {log.filter(a=>!a.isCorrect).length} sai</span>
              </div>
              <div style={{height:6,background:C.s200,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:6,background:`linear-gradient(90deg,${C.g600},#10B981)`,borderRadius:99,width:`${((idx+(confirmed?1:0))/totalQ)*100}%`,transition:"width 0.4s"}}/>
              </div>
            </div>
            <div style={{background:"white",borderRadius:22,padding:26,boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
              <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10,fontWeight:900,color:C.g600,background:C.g50,padding:"3px 9px",borderRadius:6}}>Câu {idx+1}</span>
                <span style={{fontSize:10,fontWeight:700,color:C.p600,background:C.p50,padding:"3px 9px",borderRadius:6}}>{TYPE_LABEL[q.type]}</span>
                <span style={{fontSize:10,fontWeight:700,color:LVL_C[q.level]||C.s400,background:LVL_BG[q.level]||C.s50,padding:"3px 9px",borderRadius:6}}>Mức {q.level}</span>
              </div>
              <p style={{fontSize:17,fontWeight:700,color:C.s900,lineHeight:1.5,marginBottom:22,whiteSpace:"pre-wrap"}}>{q.content}</p>

              {q.type==="multiple_choice"&&(
                <div style={{display:"flex",flexDirection:"column",gap:9}}>
                  {q.options?.map((opt,i)=>{
                    const ltr=opt.trim()[0], selected=sel===ltr;
                    const isRight=confirmed&&ltr===q.answer.trim()[0].toUpperCase(), isWrong=confirmed&&selected&&!isRight;
                    return <button key={i} onClick={()=>!confirmed&&setSel(ltr)} style={{padding:"13px 17px",borderRadius:14,fontSize:14,fontWeight:selected||isRight?700:500,cursor:confirmed?"default":"pointer",textAlign:"left",transition:"all 0.15s",border:"2px solid",
                      background:isRight?C.g50:isWrong?C.r50:selected?C.b50:C.s50,
                      borderColor:isRight?C.g600:isWrong?"#EF4444":selected?C.b600:C.s200,
                      color:isRight?C.g800:isWrong?"#991B1B":selected?C.b600:C.s700}}>
                      {isRight&&<span style={{marginRight:5}}>✓</span>}{isWrong&&<span style={{marginRight:5}}>✗</span>}{opt}
                    </button>;
                  })}
                </div>
              )}

              {q.type==="true_false"&&(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 76px 76px",gap:7,padding:"8px 14px",background:C.s100,borderRadius:9,fontSize:9,fontWeight:900,textTransform:"uppercase",letterSpacing:"0.08em",color:C.s400,marginBottom:8}}>
                    <span>Nhận định</span><span style={{textAlign:"center"}}>Đúng</span><span style={{textAlign:"center"}}>Sai</span>
                  </div>
                  {q.subQuestions?.map((sub,i)=>{
                    const pk=tfPick[sub.id], corr=sub.answer, ok_=confirmed&&pk===corr, bad=confirmed&&pk!==undefined&&pk!==corr;
                    return <div key={sub.id} style={{display:"grid",gridTemplateColumns:"1fr 76px 76px",gap:7,padding:"11px 14px",border:`1px solid ${bad?C.r100:ok_?C.g100:C.s200}`,background:bad?C.r50:ok_?C.g50:"white",borderRadius:13,marginBottom:8,alignItems:"center",transition:"all 0.2s"}}>
                      <span style={{fontSize:14,color:C.s700,lineHeight:1.45}}><strong style={{color:C.s400,marginRight:6}}>{String.fromCharCode(97+i)})</strong>{sub.content}{confirmed&&<span style={{marginLeft:7,fontWeight:900,fontSize:13,color:ok_?C.g600:"#EF4444"}}>{ok_?"✓":"✗"}</span>}</span>
                      {["true","false"].map(v=>{
                        const active=pk===v, showAns=confirmed&&corr===v;
                        return <button key={v} onClick={()=>!confirmed&&setTfPick(p=>({...p,[sub.id]:v}))} style={{height:38,borderRadius:99,cursor:confirmed?"default":"pointer",fontWeight:900,fontSize:12,transition:"all 0.15s",border:"2px solid",
                          background:showAns?C.g600:active?({true:C.g600,false:"#EF4444"}[v]):"white",
                          borderColor:showAns?C.g600:active?({true:C.g600,false:"#EF4444"}[v]):C.s200,
                          color:showAns||active?"white":C.s400}}>{v==="true"?"Đúng":"Sai"}</button>;
                      })}
                    </div>;
                  })}
                </div>
              )}

              {q.type==="short_answer"&&(
                <div>
                  <textarea value={shortVal} onChange={e=>!confirmed&&setShortVal(e.target.value)} placeholder="Nhập câu trả lời của bạn..." disabled={confirmed}
                    style={{width:"100%",padding:"13px 16px",background:C.s50,border:`1.5px solid ${confirmed?(result?.isCorrect?C.g200:"#FECACA"):C.s200}`,borderRadius:13,fontSize:14,outline:"none",resize:"vertical",minHeight:90,color:C.s900,transition:"border-color 0.2s"}}/>
                  {confirmed&&<div style={{marginTop:9,padding:"11px 14px",background:C.p50,border:`1px solid ${C.p100}`,borderRadius:11}}><span style={{fontSize:11,fontWeight:700,color:C.p600}}>Đáp án tham khảo: </span><span style={{fontSize:13,color:C.s700}}>{q.answer}</span></div>}
                </div>
              )}

              {confirmed&&result&&(
                <div style={{marginTop:16,borderRadius:16,padding:18,border:`1.5px solid ${result.isCorrect?C.g200:"#FECACA"}`,background:result.isCorrect?"#F0FDF4":"#FEF2F2"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}>
                    <div style={{width:30,height:30,borderRadius:"50%",background:result.isCorrect?C.g600:"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"white"}}>
                      {result.isCorrect?I(Ic.Check,15):I(Ic.X,15)}
                    </div>
                    <span style={{fontWeight:900,color:result.isCorrect?C.g800:"#991B1B",fontSize:15}}>{result.isCorrect?"Trả lời đúng! 🎉":"Chưa chính xác"}</span>
                  </div>
                  <p style={{fontSize:13,color:C.s700,lineHeight:1.65,marginBottom:q.commonErrors?7:0}}><strong style={{color:C.s900}}>💡 Giải thích:</strong> {q.explanation}</p>
                  {q.commonErrors&&<p style={{fontSize:12,color:"#B91C1C",margin:0}}><strong>⚠️ Lỗi thường gặp:</strong> {q.commonErrors}</p>}
                </div>
              )}

              <div style={{marginTop:18}}>
                {!confirmed
                  ? <Btn onClick={confirm} sx={{width:"100%",padding:17,fontSize:15,borderRadius:16}}
                      disabled={(q.type==="multiple_choice"&&!sel)||(q.type==="true_false"&&q.subQuestions?.some(s=>tfPick[s.id]===undefined))}>
                      Xác nhận đáp án
                    </Btn>
                  : <Btn onClick={next} variant="dark" sx={{width:"100%",padding:16,fontSize:15,borderRadius:16}}>
                      {idx<totalQ-1?"Câu tiếp theo":"Xem kết quả tổng kết"} {I(Ic.Arrow,18)}
                    </Btn>
                }
              </div>
            </div>
          </div>
        )}

        {step==="finished"&&(
          <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{background:"white",borderRadius:22,padding:34,boxShadow:"0 4px 24px rgba(0,0,0,.07)",textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:7}}>🏆</div>
              <h2 style={{fontSize:24,fontWeight:900,color:C.s900,marginBottom:6}}>Hoàn thành bài thi!</h2>
              <p style={{color:C.s400,fontSize:14,marginBottom:22}}>Xin chào <strong style={{color:C.g600}}>{info.name}</strong></p>
              <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:`linear-gradient(135deg,${C.g50},white)`,border:`2px solid ${C.g200}`,borderRadius:20,padding:"20px 44px",marginBottom:22}}>
                <div style={{fontSize:62,fontWeight:900,color:C.g600,lineHeight:1}}>{sc}</div>
                <div style={{fontSize:18,color:C.s400}}>/ {totalQ} câu</div>
                <div style={{marginTop:8,padding:"6px 22px",background:gradeColor(grd),color:"white",borderRadius:99,fontSize:15,fontWeight:900}}>{grd} — {Math.round(pct)}%</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
                {[{l:"Câu đúng",v:sc,c:C.g600,bg:C.g50},{l:"Câu sai",v:totalQ-sc,c:C.r600,bg:C.r50},{l:"Tổng câu",v:totalQ,c:C.s700,bg:C.s100}].map(s=>(
                  <div key={s.l} style={{background:s.bg,borderRadius:13,padding:"13px 10px"}}>
                    <div style={{fontSize:24,fontWeight:900,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:11,color:C.s400,marginTop:3}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <p style={{fontSize:12,color:C.s400,marginBottom:20}}>
                {saving?"⏳ Đang lưu kết quả...":"✅ Kết quả đã lưu vào Firebase và gửi về giáo viên."}
              </p>
              <Btn onClick={onHome} variant="ghost" sx={{borderRadius:13,padding:"11px 26px",margin:"0 auto"}}>{I(Ic.Home,16)} Về trang chủ</Btn>
            </div>
            <div style={{background:"white",borderRadius:22,overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
              <div style={{padding:"17px 24px",borderBottom:`1px solid ${C.s100}`,fontWeight:900,color:C.s900,fontSize:15}}>📋 Xem lại từng câu</div>
              {log.map((a,i)=>(
                <div key={i} style={{padding:"14px 22px",borderBottom:`1px solid ${C.s50}`,display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:a.isCorrect?C.g600:"#EF4444",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,color:"white"}}>
                    {a.isCorrect?I(Ic.Check,13):I(Ic.X,13)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:6,marginBottom:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:900,color:C.g600,background:C.g50,padding:"1px 7px",borderRadius:4}}>Câu {i+1}</span>
                      <span style={{fontSize:10,fontWeight:700,color:LVL_C[a.level]||C.s400,background:LVL_BG[a.level]||C.s50,padding:"1px 7px",borderRadius:4}}>Mức {a.level}</span>
                    </div>
                    <p style={{fontSize:13,color:C.s700,marginBottom:4,lineHeight:1.45}}>{a.question}</p>
                    {!a.isCorrect&&a.explanation&&<p style={{fontSize:12,color:C.s400,fontStyle:"italic",lineHeight:1.45}}>{a.explanation}</p>}
                  </div>
                  <span style={{flexShrink:0,fontSize:18}}>{a.isCorrect?"✅":"❌"}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
